<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Inline CSS for background image and card styling */
        body,
        html {
            height: 100%;
            margin: 0;
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .card {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
        }

        .btn-warning {
            background-color: #FFCC00;
            border-color: #FFCC00;
        }

        .btn-warning:hover {
            background-color: #E6B800;
            border-color: #E6B800;
        }
    </style>
</head>

<body>
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">
                    <img src="" alt="" class="mb-3" style="width: 50px;">
                    <br>Weather App
                </h3>
                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label">Your Email</label>
                        <input type="email" class="form-control" id="email" placeholder="user1234@example.com" required>
                        <div class="invalid-feedback">
                            Please include an '@' in the email address. 
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Log in</button>
                </form>
                <div class="text-center mt-3">
                    <a href="#" class="text-light">Don't have an account yet? Sign up</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const emailField = document.getElementById('email');
            const password = document.getElementById('password').value;

            // Custom email validation
            if (!emailField.checkValidity()) {
                emailField.classList.add('is-invalid');
                return;
            } else {
                emailField.classList.remove('is-invalid');
            }

            if (!password || password.length < 6) {
                alert('Password must be at least 6 characters long.');
                return;
            }

            alert('Login successful!');
        });

        // To provide instant feedback, we can also listen to the input event
        document.getElementById('email').addEventListener('input', function() {
            const emailField = document.getElementById('email');
            if (emailField.checkValidity()) {
                emailField.classList.remove('is-invalid');
            }
        });
    </script>
</body>

</html>
